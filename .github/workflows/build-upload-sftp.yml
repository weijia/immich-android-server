name: Build Android APK and Upload to SFTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    if: github.repository == 'weijia/immich-android-server'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APKs
        run: |
          chmod +x gradlew
          bash gradlew :androidApp:assembleModernDebug :androidApp:assembleLegacyDebug --info 2>&1 | tail -50

      - name: List build outputs
        run: find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Prepare upload directory
        run: |
          mkdir -p upload
          find . -name "*.apk" -type f -exec cp {} upload/ \;
          ls -la upload/

      - name: Upload APK to SFTP
        uses: weijia/action-upload-sftp@master
        with:
          sftp-host: ${{ secrets.SFTP_HOST }}
          sftp-port: ${{ secrets.SFTP_PORT }}
          sftp-username: ${{ secrets.SFTP_USERNAME }}
          sftp-password: ${{ secrets.SFTP_PASSWORD }}
          source-path: ./upload/
          remote-path: /home/github/apps/immich-android-server/
          cleanup-old-files: 'true'
          max-keep-files: 5
