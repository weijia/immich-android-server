name: Build Android APK and Upload to SFTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-version:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      build_type: ${{ steps.version.outputs.build_type }}
      build_tag: ${{ steps.version.outputs.build_tag }}
      build_datetime: ${{ steps.version.outputs.build_datetime }}
      build_timezone: ${{ steps.version.outputs.build_timezone }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          chmod +x scripts/generate_version.sh
          bash scripts/generate_version.sh >> $GITHUB_OUTPUT
          echo "--- Version Info ---"
          cat $GITHUB_OUTPUT

  build-and-upload:
    needs: generate-version
    runs-on: ubuntu-latest
    if: github.repository == 'weijia/immich-android-server'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew :androidApp:assembleModernDebug \
            -PversionName=${{ needs.generate-version.outputs.version_name }} \
            -PversionCode=${{ needs.generate-version.outputs.version_code }}

      - name: Prepare upload directory
        run: |
          mkdir -p upload
          # 使用版本号作为文件名
          VERSION="${{ needs.generate-version.outputs.version_name }}"
          cp androidApp/build/outputs/apk/modern/debug/*.apk "upload/immich-server-${VERSION}.apk"
          echo "--- Upload Files ---"
          ls -la upload/

      - name: Upload APK to SFTP
        uses: weijia/action-upload-sftp@master
        with:
          sftp-host: ${{ secrets.SFTP_HOST }}
          sftp-port: ${{ secrets.SFTP_PORT }}
          sftp-username: ${{ secrets.SFTP_USERNAME }}
          sftp-password: ${{ secrets.SFTP_PASSWORD }}
          source-path: ./upload/
          remote-path: /home/github/apps/immich-android-server/
          cleanup-old-files: 'true'
          max-keep-files: 10

  build-summary:
    needs: [generate-version, build-and-upload]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version Name | \`${{ needs.generate-version.outputs.version_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version Code | \`${{ needs.generate-version.outputs.version_code }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | \`${{ needs.generate-version.outputs.build_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git Tag | \`${{ needs.generate-version.outputs.build_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Time | \`${{ needs.generate-version.outputs.build_datetime }}\` \`${{ needs.generate-version.outputs.build_timezone }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
