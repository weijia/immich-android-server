name: Build All Platforms

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  android-modern:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build Android Modern (minSdk 21, Compose UI)
        run: ./gradlew :androidApp:assembleModernDebug
      - name: Upload Android Modern APK
        uses: actions/upload-artifact@v4
        with:
          name: android-modern-debug-apk
          path: androidApp/build/outputs/apk/modern/debug/*.apk

  android-legacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build Android Legacy (minSdk 16, XML UI)
        run: ./gradlew :androidApp:assembleLegacyDebug
      - name: Upload Android Legacy APK
        uses: actions/upload-artifact@v4
        with:
          name: android-legacy-debug-apk
          path: androidApp/build/outputs/apk/legacy/debug/*.apk

  jvm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build JVM Minimal
        run: ./gradlew :minimal:build
      - name: Upload JVM Jar
        uses: actions/upload-artifact@v4
        with:
          name: jvm-minimal
          path: minimal/build/libs/*.jar

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build iOS Framework
        run: ./gradlew :shared:linkDebugFrameworkIosArm64
      - name: Upload iOS Framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: shared/build/bin/iosArm64/debugFramework/*.framework
